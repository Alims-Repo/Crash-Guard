name: Publish to Maven Central

# Triggers on any tag that starts with "v" — e.g. v0.5.7-beta, v1.0.0
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish
    runs-on: macos-latest  # macOS is required to compile iOS KLIBs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21.0.7'
          distribution: 'temurin'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Publish to Maven Central
        # SIGNING_KEY secret must be the ASCII-armored private key encoded as base64.
        # Passing it as base64 avoids multi-line env-var corruption; Gradle decodes it internally.
        run: ./gradlew :crash-guard:publishAllPublicationsToMavenCentralRepository --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyBase64: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
